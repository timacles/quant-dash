<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Config — qDash</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #060c18;
      --line: rgba(148, 163, 184, 0.18);
      --text: #e7edf7;
      --muted: #98a7bd;
      --accent: #7dd3fc;
      --accent-dim: rgba(125, 211, 252, 0.15);
      --danger: #f87171;
      --success: #4ade80;
      --input-bg: rgba(255,255,255,0.05);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 18px;
      background:
        radial-gradient(circle at top right, rgba(56, 189, 248, 0.12), transparent 24%),
        linear-gradient(180deg, #091120 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }
    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 28px 32px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(19, 35, 58, 0.95), rgba(12, 21, 35, 0.98));
      box-shadow: 0 24px 60px rgba(2, 6, 23, 0.45);
    }
    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
    h1 { margin: 12px 0 6px; font-size: clamp(26px, 4vw, 36px); letter-spacing: -0.03em; }
    .subtitle { margin: 0 0 28px; color: var(--muted); font-size: 14px; }
    .back { display: inline-flex; margin-bottom: 24px; color: var(--accent); text-decoration: none; font-weight: 700; font-size: 13px; }
    label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    select {
      width: 100%;
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      appearance: none;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: var(--accent); }
    .section-editor { display: none; margin-top: 28px; }
    .section-editor.visible { display: block; }
    .editor-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
    @media (max-width: 800px) { .editor-grid { grid-template-columns: 1fr; } }
    .panel-title {
      font-size: 12px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted); margin: 0 0 10px;
    }
    /* Active columns list */
    .col-list { list-style: none; margin: 0; padding: 0; }
    .col-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      margin-bottom: 4px;
      background: var(--input-bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: grab;
      user-select: none;
      font-size: 13px;
      transition: background 0.15s;
    }
    .col-item:active { cursor: grabbing; }
    .col-item.drag-over { border-color: var(--accent); background: var(--accent-dim); }
    .col-item.dragging { opacity: 0.4; }
    .drag-handle { color: var(--muted); flex-shrink: 0; font-size: 16px; }
    .col-name { flex: 1; }
    .col-remove {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 16px; line-height: 1; padding: 0 2px; flex-shrink: 0;
      transition: color 0.15s;
    }
    .col-remove:hover { color: var(--danger); }
    /* Available columns list */
    .avail-list { list-style: none; margin: 0; padding: 0; }
    .avail-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 12px;
      margin-bottom: 4px;
      background: var(--input-bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
    }
    .avail-item:hover { border-color: var(--accent); background: var(--accent-dim); }
    .avail-add { color: var(--accent); font-size: 18px; line-height: 1; flex-shrink: 0; }
    .avail-empty { color: var(--muted); font-size: 12px; font-style: italic; }
    /* Labels table */
    .labels-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .labels-table th {
      text-align: left; font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); padding: 0 0 8px;
    }
    .labels-table td { padding: 3px 0; }
    .label-key { color: var(--muted); padding-right: 12px; white-space: nowrap; font-size: 12px; }
    .label-input {
      width: 100%;
      padding: 6px 10px;
      background: var(--input-bg);
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
    }
    .label-input:focus { outline: none; border-color: var(--accent); }
    /* Actions */
    .actions { margin-top: 24px; display: flex; align-items: center; gap: 14px; }
    .btn-save {
      padding: 10px 24px;
      background: var(--accent);
      color: #060c18;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
    .toast { font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    .toast.ok { color: var(--success); }
    .toast.err { color: var(--danger); }
    .loading { color: var(--muted); font-size: 13px; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="page">
    <a class="back" href="/">← Back to dashboard</a>
    <div class="eyebrow">Config</div>
    <h1>Section Config Editor</h1>
    <p class="subtitle">Select a section to reorder columns and edit display labels.</p>

    <label for="section-select">Section</label>
    <select id="section-select">
      <option value="">— select a section —</option>
    </select>

    <div class="loading" id="loading" style="display:none">Loading…</div>

    <div class="section-editor" id="section-editor">
      <div class="editor-grid">
        <div>
          <div class="panel-title">Active Columns <span style="color:var(--accent);font-size:10px;letter-spacing:0">(drag to reorder)</span></div>
          <ul class="col-list" id="col-list"></ul>
        </div>
        <div>
          <div class="panel-title">Available Columns <span style="color:var(--accent);font-size:10px;letter-spacing:0">(click to add)</span></div>
          <ul class="avail-list" id="avail-list"></ul>
        </div>
        <div>
          <div class="panel-title">Column Labels</div>
          <table class="labels-table">
            <thead><tr><th>Column</th><th>Label</th></tr></thead>
            <tbody id="labels-body"></tbody>
          </table>
        </div>
      </div>
      <div class="actions">
        <button class="btn-save" id="btn-save">Save</button>
        <span class="toast" id="toast"></span>
      </div>
    </div>
  </div>

  <script>
    const selectEl   = document.getElementById('section-select');
    const editorEl   = document.getElementById('section-editor');
    const colList    = document.getElementById('col-list');
    const availList  = document.getElementById('avail-list');
    const labelsBody = document.getElementById('labels-body');
    const btnSave    = document.getElementById('btn-save');
    const toast      = document.getElementById('toast');
    const loadingEl  = document.getElementById('loading');

    let currentSectionKey = '';
    let allSections = [];
    let allViewColumns = [];   // ordered list from view

    // ── load all section keys on boot ──────────────────────────────────────
    async function loadSections() {
      const res = await fetch('/api/config/section');
      const data = await res.json();
      allSections = data.sections || [];
      for (const s of allSections) {
        const opt = document.createElement('option');
        opt.value = s.section_key;
        opt.textContent = s.section_key;
        selectEl.appendChild(opt);
      }
    }

    // ── render editor ─────────────────────────────────────────────────────
    function renderEditor(data) {
      currentSectionKey = data.section_key;
      allViewColumns = data.all_columns || [];
      renderColList(data.active_columns);
      renderAvailList(data.active_columns);
      renderLabels(data.active_columns, data.column_labels);
      editorEl.classList.add('visible');
    }

    function renderColList(columns) {
      colList.innerHTML = '';
      for (const col of columns) {
        colList.appendChild(makeActiveItem(col));
      }
    }

    function makeActiveItem(col) {
      const li = document.createElement('li');
      li.className = 'col-item';
      li.draggable = true;
      li.dataset.col = col;
      li.innerHTML = `<span class="drag-handle">⠿</span><span class="col-name">${col}</span><button class="col-remove" title="Remove column" type="button">×</button>`;
      li.querySelector('.col-remove').addEventListener('click', () => removeColumn(col));
      attachDragListeners(li);
      return li;
    }

    function renderAvailList(activeColumns) {
      const activeSet = new Set(activeColumns);
      const available = allViewColumns.filter(c => !activeSet.has(c));
      availList.innerHTML = '';
      if (!available.length) {
        const li = document.createElement('li');
        li.className = 'avail-empty';
        li.textContent = 'All columns are active.';
        availList.appendChild(li);
        return;
      }
      for (const col of available) {
        availList.appendChild(makeAvailItem(col));
      }
    }

    function makeAvailItem(col) {
      const li = document.createElement('li');
      li.className = 'avail-item';
      li.dataset.col = col;
      li.innerHTML = `<span>${col}</span><span class="avail-add">+</span>`;
      li.addEventListener('click', () => addColumn(col));
      return li;
    }

    function addColumn(col) {
      const currentLabels = getCurrentLabels();
      colList.appendChild(makeActiveItem(col));
      // auto-generate label: title-case, replace underscores with spaces
      if (!currentLabels[col]) {
        currentLabels[col] = col.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      }
      // remove from avail list
      const availItem = availList.querySelector(`.avail-item[data-col="${CSS.escape(col)}"]`);
      if (availItem) availItem.remove();
      if (!availList.querySelector('.avail-item')) {
        const li = document.createElement('li');
        li.className = 'avail-empty';
        li.textContent = 'All columns are active.';
        availList.appendChild(li);
      }
      renderLabels(getCurrentColumns(), currentLabels);
    }

    function removeColumn(col) {
      const activeItem = colList.querySelector(`.col-item[data-col="${CSS.escape(col)}"]`);
      if (activeItem) activeItem.remove();
      // add back to avail list in original view order
      availList.querySelector('.avail-empty')?.remove();
      const currentActive = new Set(getCurrentColumns());
      // rebuild avail list in view order to keep it sorted
      const newAvail = allViewColumns.filter(c => !currentActive.has(c));
      availList.innerHTML = '';
      if (!newAvail.length) {
        const li = document.createElement('li');
        li.className = 'avail-empty';
        li.textContent = 'All columns are active.';
        availList.appendChild(li);
      } else {
        for (const c of newAvail) availList.appendChild(makeAvailItem(c));
      }
      renderLabels(getCurrentColumns(), getCurrentLabels());
    }

    function renderLabels(columns, labels) {
      labelsBody.innerHTML = '';
      for (const col of columns) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="label-key">${col}</td>
          <td><input class="label-input" data-col="${col}" value="${escHtml(labels[col] || '')}" /></td>
        `;
        labelsBody.appendChild(tr);
      }
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    }

    // ── drag-and-drop reorder ──────────────────────────────────────────────
    let dragSrc = null;

    function attachDragListeners(li) {
      li.addEventListener('dragstart', e => {
        dragSrc = li;
        li.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      li.addEventListener('dragend', () => {
        li.classList.remove('dragging');
        document.querySelectorAll('.col-item').forEach(el => el.classList.remove('drag-over'));
        syncLabelsToColumns();
      });
      li.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (li !== dragSrc) li.classList.add('drag-over');
      });
      li.addEventListener('dragleave', () => li.classList.remove('drag-over'));
      li.addEventListener('drop', e => {
        e.preventDefault();
        if (dragSrc && dragSrc !== li) {
          const items = [...colList.children];
          const fromIdx = items.indexOf(dragSrc);
          const toIdx   = items.indexOf(li);
          if (fromIdx < toIdx) colList.insertBefore(dragSrc, li.nextSibling);
          else colList.insertBefore(dragSrc, li);
        }
        li.classList.remove('drag-over');
      });
    }

    function syncLabelsToColumns() {
      const currentLabels = getCurrentLabels();
      const newOrder = getCurrentColumns();
      renderLabels(newOrder, currentLabels);
    }

    function getCurrentColumns() {
      return [...colList.querySelectorAll('.col-item')].map(li => li.dataset.col);
    }

    function getCurrentLabels() {
      const result = {};
      labelsBody.querySelectorAll('.label-input').forEach(inp => {
        result[inp.dataset.col] = inp.value;
      });
      return result;
    }

    // ── section selector ──────────────────────────────────────────────────
    selectEl.addEventListener('change', async () => {
      const key = selectEl.value;
      if (!key) { editorEl.classList.remove('visible'); return; }
      loadingEl.style.display = 'block';
      editorEl.classList.remove('visible');
      try {
        const res = await fetch(`/api/config/section/columns?key=${encodeURIComponent(key)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load section');
        renderEditor(data);
      } catch (err) {
        showToast(err.message, 'err');
      } finally {
        loadingEl.style.display = 'none';
      }
    });

    // ── save ──────────────────────────────────────────────────────────────
    btnSave.addEventListener('click', async () => {
      btnSave.disabled = true;
      const columns = getCurrentColumns();
      const column_labels = getCurrentLabels();

      if (!columns.length) {
        showToast('At least one column is required', 'err');
        btnSave.disabled = false;
        return;
      }
      const missing = columns.filter(c => !column_labels[c]?.trim());
      if (missing.length) {
        showToast(`Missing labels for: ${missing.join(', ')}`, 'err');
        btnSave.disabled = false;
        return;
      }

      try {
        const res = await fetch('/api/config/section', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ section_key: currentSectionKey, columns, column_labels }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Save failed');
        showToast('Saved!', 'ok');
      } catch (err) {
        showToast(err.message, 'err');
      } finally {
        btnSave.disabled = false;
      }
    });

    let toastTimer;
    function showToast(msg, type) {
      toast.textContent = msg;
      toast.className = `toast show ${type}`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
    }

    loadSections();
  </script>
</body>
</html>
