<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Config</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #060c18;
      --line: rgba(148, 163, 184, 0.18);
      --text: #e7edf7;
      --muted: #98a7bd;
      --accent: #7dd3fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 18px;
      background:
        radial-gradient(circle at top right, rgba(56, 189, 248, 0.12), transparent 24%),
        linear-gradient(180deg, #091120 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
    }

    .config-page {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(19, 35, 58, 0.95), rgba(12, 21, 35, 0.98));
      box-shadow: 0 24px 60px rgba(2, 6, 23, 0.45);
    }

    .config-page__eyebrow {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .config-page__title {
      margin: 12px 0 10px;
      font-size: clamp(30px, 4vw, 40px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .config-page__body {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .config-page__back {
      display: inline-flex;
      margin-top: 20px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="config-page">
    <div class="config-page__eyebrow">Config</div>
    <h1 class="config-page__title">Configuration Placeholder</h1>
    <p class="config-page__body">Configuration details are not exposed here yet. This page is reserved for future dashboard settings and operational links.</p>
    <a class="config-page__back" href="/">Back to dashboard</a>
  </section>
</body>
</html>
